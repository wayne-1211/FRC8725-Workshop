<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Team 8725 培訓室管理</title>

  <!-- PWA: manifest + theme -->
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#c6543d">
  <meta name="description" content="查詢及管理培訓室中的工具、材料、存放位置、使用狀態與數量。">

  <!-- Icons -->
  <link rel="icon" href="images/icon.ico">
  <link rel="apple-touch-icon" href="images/icons/pwa/apple-touch-icon.png">

  <!-- iOS "add to home screen" support (Safari does not read the manifest) -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="8725 Workshop">

  <!-- Windows tile support -->
  <meta name="msapplication-TileColor" content="#c6543d">
  <meta name="msapplication-TileImage" content="images/icons/pwa/icon-144x144.png">

  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/home.css">
  <link rel="stylesheet" href="css/storage.css">
  <link rel="stylesheet" href="css/auth.css">
  <link rel="stylesheet" href="css/users.css">
  <link rel="stylesheet" href="css/ops.css">
</head>

<body>
  <div class="app">
    <nav class="side-nav" id="side-nav" aria-label="主導覽">
      <button type="button" id="sidebar-toggle" class="sidebar-toggle" aria-label="收合側邊欄" aria-expanded="true"
        title="收合側邊欄">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.4"
          stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
      </button>
      <div class="brand">
        <img class="brand-logo" src="images/icon.ico" alt="Team 8725 Misty Panther Logo">
        <div class="brand-text">
          <div class="brand-name">Team 8725</div>
          <div class="brand-sub">Misty Panther · Workshop</div>
        </div>
      </div>
      <div class="nav-group" id="primary-nav"></div>
      <div class="nav-spacer"></div>
      <div id="account-host"></div>
    </nav>
    <main class="main" id="page-outlet" aria-live="polite">
      <div class="state-block">
        <div class="spinner"></div>正在確認登入狀態…
      </div>
    </main>
  </div>
  <script type="module" src="js/core/main.js"></script>
</body>

</html>
